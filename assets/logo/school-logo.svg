<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="altLogoTitle altLogoDesc">
  <title id="altLogoTitle">Kaagusue Faith Christian Academy Monogram Logo</title>
  <desc id="altLogoDesc">Circular monogram logo with KFCA initials and school name around the ring.</desc>

  <!-- Outer ring -->
  <circle cx="200" cy="200" r="190" fill="none" stroke="#EF9F27" stroke-width="6"/>
  <circle cx="200" cy="200" r="178" fill="#042C53" stroke="#FAC775" stroke-width="2"/>

  <!-- Top text path -->
  <defs>
    <path id="topArc" d="M 60,200 A 140,140 0 0,1 340,200"/>
    <path id="bottomArc" d="M 70,210 A 130,130 0 0,0 330,210"/>
  </defs>

  <!-- School name -->
  <text font-family="Georgia, serif" font-size="14" fill="#FAC775" font-weight="bold" letter-spacing="3">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">
      KAAGUSUE FAITH CHRISTIAN ACADEMY
    </textPath>
  </text>

  <!-- Motto -->
  <text font-family="Georgia, serif" font-size="12" fill="#EF9F27" font-style="italic" letter-spacing="2">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">
      FAITH · KNOWLEDGE · EXCELLENCE
    </textPath>
  </text>

  <!-- Cross in center -->
  <g fill="#EF9F27">
    <rect x="188" y="135" width="24" height="8" rx="3"/>
    <rect x="196" y="120" width="8" height="40" rx="3"/>
  </g>

  <!-- KFCA monogram -->
  <text x="200" y="245" text-anchor="middle"
        font-family="Georgia, serif" font-size="52"
        font-weight="bold" fill="#FAC775" letter-spacing="10">
    KFCA
  </text>
</svg>
